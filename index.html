<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI共創作品集</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #1e293b;
    }

    nav button {
      margin: 5px;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #334155;
      color: white;
      cursor: pointer;
    }

    nav button.active {
      background: #38bdf8;
      color: black;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    /* 🎨 瀑布流畫廊 */
    .gallery {
      column-count: 3;
      column-gap: 15px;
    }

    @media (max-width: 900px) {
      .gallery { column-count: 2; }
    }

    @media (max-width: 500px) {
      .gallery { column-count: 1; }
    }

    .item {
      break-inside: avoid;
      margin-bottom: 15px;
      cursor: pointer;
    }

    .item img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.2s;
    }

    .item img:hover {
      transform: scale(1.02);
    }

    /* 音樂 */
    .music-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .hidden { display: none; }

    /* 放大圖 */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
    }
  </style>
</head>

<!-- 放大圖 -->
<div class="lightbox" id="lightbox" onclick="closeImage()">
  <img id="lightbox-img">
</div>

<script>
function showSection(section) {
  document.getElementById('music').classList.add('hidden');
  document.getElementById('art').classList.add('hidden');

  document.getElementById(section).classList.remove('hidden');

  document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
}

function openImage(src) {
  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightbox-img').src = src;
}

function closeImage() {
  document.getElementById('lightbox').style.display = 'none';
}
</script>
