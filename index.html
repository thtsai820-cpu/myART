<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的AI作品集</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #1e293b;
    }

    h1 { margin: 0; }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    nav button {
      background: #334155;
      border: none;
      color: white;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 6px;
    }

    nav button.active {
      background: #38bdf8;
      color: black;
    }

    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    img {
      width: 100%;
      border-radius: 8px;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<header>
  <h1>我的AI創作作品集</h1>
  <nav>
    <button onclick="showSection('music')" class="active">音樂</button>
    <button onclick="showSection('art')">圖片</button>
  </nav>
</header>

<div class="container">

  <!-- 音樂區 -->
  <section id="music" class="grid">
    <!-- 範例音樂 -->
    <div class="card">
      <h3>作品名稱 1</h3>
      <p>簡短描述</p>
      <audio controls>
        <source src="music/song1.mp3" type="audio/mpeg">
      </audio>
    </div>

    <!-- 新作品複製這塊 -->
  </section>

  <!-- 圖片區 -->
  <section id="art" class="grid hidden">
    <!-- 範例圖片 -->
    <div class="card">
      <img src="images/art1.jpg" alt="作品">
      <h3>作品名稱 1</h3>
      <p>簡短描述</p>
    </div>

    <!-- 新作品複製這塊 -->
  </section>

</div>

<script>
function showSection(section) {
  document.getElementById('music').classList.add('hidden');
  document.getElementById('art').classList.add('hidden');

  document.getElementById(section).classList.remove('hidden');

  document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
}
</script>

</body>
</html>
