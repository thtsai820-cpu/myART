<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI共創作品集</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:#e2e8f0; }
header { text-align:center; padding:20px; background:#1e293b; }

nav button {
  margin:5px; padding:8px 16px;
  border:none; border-radius:6px;
  background:#334155; color:white;
  cursor:pointer;
}
nav button.active { background:#38bdf8; color:black; }

.container { max-width:1200px; margin:auto; padding:20px; }

/* 🎧 音樂播放器 */
.music-player {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:20px;
}

.player {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.controls button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  cursor:pointer;
}

.playlist {
  background:#1e293b;
  border-radius:12px;
  max-height:500px;
  overflow-y:auto;
}

.track {
  padding:10px;
  border-bottom:1px solid #334155;
  cursor:pointer;
}

.track:hover { background:#334155; }
.active-track { background:#38bdf8; color:black; }

/* 🎨 畫廊 */
.gallery { column-count:3; column-gap:15px; }
@media (max-width:900px){ .gallery{column-count:2;} }
@media (max-width:500px){ .gallery{column-count:1;} }

.item { break-inside:avoid; margin-bottom:15px; cursor:pointer; }
.item img { width:100%; border-radius:10px; }

.hidden { display:none; }

/* 放大 */
.lightbox {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}
.lightbox img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<header>
<h1>AI共創作品集</h1>
<nav>
<button onclick="showSection('music')" class="active">音樂</button>
<button onclick="showSection('art')">圖象</button>
<button onclick="showSection('calligraphy')">書法</button>
</nav>
</header>

<div class="container">

<!-- 🎧 音樂 -->
<section id="music" class="music-player">
  <div class="player">
    <h2 id="title">選擇音樂</h2>
    <audio id="audio" controls></audio>

    <div class="controls">
      <button onclick="prev()">⏮</button>
      <button onclick="playPause()">▶ / ⏸</button>
      <button onclick="next()">⏭</button>
    </div>
  </div>

  <div class="playlist" id="playlist"></div>
</section>

<!-- 🖼️ 圖象 -->
<section id="art" class="gallery hidden"></section>

<!-- 🖌️ 書法 -->
<section id="calligraphy" class="gallery hidden"></section>

</div>

<div class="lightbox" id="lightbox" onclick="closeImage()">
<img id="lightbox-img">
</div>

<script>

/* 🎧 音樂（只改這裡就好🔥） */
const tracks = [
  {title:"杯來芳茗之一", file:"music/music1.mp3"},
  {title:"杯來芳茗", file:"music/music2.mp3"},
  {title:"禪香流轉之一", file:"music/music3.mp3"},
  {title:"禪香流轉", file:"music/music4.mp3"},
  {title:"晨請盛宴", file:"music/music5.mp3"},
  {title:"川澗夏蟬", file:"music/music6.mp3"},
  {title:"春分心寬之一", file:"music/music7.mp3"},
  {title:"春分心寬", file:"music/music8.mp3"},
  {title:"春分一盞茶之一", file:"music/music9.mp3"},
  {title:"春分一盞茶", file:"music/music10.mp3"},
  {title:"春雷悶悶", file:"music/music11.mp3"},
  {title:"春雨早晨的物語", file:"music/music12.mp3"},
  {title:"大湖盛宴", file:"music/music13.mp3"},
  {title:"多陽暖窗台", file:"music/music14.mp3"},
  {title:"二葉淡香", file:"music/music15.mp3"},
  {title:"粉雨簾下", file:"music/music16.mp3"},
  {title:"古音奏鳴", file:"music/music17.mp3"},
  {title:"孤舟南州", file:"music/music18.mp3"},
  {title:"光陰薄霧之一", file:"music/music19.mp3"},
  {title:"光陰薄霧", file:"music/music20.mp3"},
  {title:"紅台覽江河之一", file:"music/music21.mp3"},
  {title:"紅台覽江河", file:"music/music22.mp3"},
  {title:"假日十二美", file:"music/music23.mp3"},
  {title:"江湖雨聲之一", file:"music/music24.mp3"},
  {title:"江湖雨聲", file:"music/music25.mp3"}
];

/* 🖼️ 圖象 */
const artworks = [
  {title:"百年回眸", file:"art/art1.png"},
  {title:"魚戲新芽", file:"art/art2.png"},
  {title:"幸哉風自沐", file:"art/art3.png"},
  {title:"氣清山霽風", file:"art/art4.png"},
  {title:"黃玲述春意", file:"art/art5.png"},
  {title:"輕舟慢渡", file:"art/art6.png"},
  {title:"遙記當年", file:"art/art7.jpg"},
  {title:"雨中獨行", file:"art/art8.jpg"},
  {title:"清明念祖", file:"art/art9.jpg"},
  {title:"一擊", file:"art/art10.jpg"}
];

/* 🖌️ 書法 */
const calligraphy = [
  {title:"書法小品一", file:"calligraphy/img1.png"},
  {title:"書法小品二", file:"calligraphy/img2.png"},
  {title:"書法小品三", file:"calligraphy/img3.png"},
  {title:"書法小品四", file:"calligraphy/img4.png"}
];

/* 🎧 播放器 */
let current = 0;
const audio = document.getElementById('audio');
const title = document.getElementById('title');
const playlist = document.getElementById('playlist');

function loadTrack(i){
  current = i;
  audio.src = tracks[i].file;
  title.innerText = tracks[i].title;
  highlight();
}

function playPause(){
  if(audio.paused) audio.play(); else audio.pause();
}

function next(){
  current = (current+1)%tracks.length;
  loadTrack(current);
  audio.play();
}

function prev(){
  current = (current-1+tracks.length)%tracks.length;
  loadTrack(current);
  audio.play();
}

audio.addEventListener('ended', next);

/* 自動生成音樂清單 */
tracks.forEach((t,i)=>{
  const div=document.createElement('div');
  div.className='track';
  div.innerText=t.title;
  div.onclick=()=>{loadTrack(i); audio.play();};
  playlist.appendChild(div);
});

function highlight(){
  document.querySelectorAll('.track').forEach((el,i)=>{
    el.classList.toggle('active-track', i===current);
  });
}

loadTrack(0);

/* 🖼️ 自動畫廊 */
function renderGallery(data, id){
  const container = document.getElementById(id);
  data.forEach(item=>{
    const div=document.createElement('div');
    div.className='item';
    div.innerHTML=`<img src=\"${item.file}\"><p>${item.title}</p>`;
    div.onclick=()=>openImage(item.file);
    container.appendChild(div);
  });
}

renderGallery(artworks,'art');
renderGallery(calligraphy,'calligraphy');

/* UI */
function showSection(section){
  ['music','art','calligraphy'].forEach(id=>{
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById(section).classList.remove('hidden');

  document.querySelectorAll('nav button').forEach(btn=>btn.classList.remove('active'));
  event.target.classList.add('active');
}

function openImage(src){
  document.getElementById('lightbox').style.display='flex';
  document.getElementById('lightbox-img').src=src;
}

function closeImage(){
  document.getElementById('lightbox').style.display='none';
}

</script>

</body>
</html>
