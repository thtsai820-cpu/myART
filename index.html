<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的AI作品集</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      text-align: center;
      padding: 20px;
      background: #1e293b;
    }

    nav button {
      margin: 5px;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #334155;
      color: white;
      cursor: pointer;
    }

    nav button.active {
      background: #38bdf8;
      color: black;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .hidden { display: none; }

    /* 放大圖片（Lightbox） */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      height: auto;
    }
  </style>
</head>

<body>

<header>
  <h1>我的AI創作作品集</h1>
  <nav>
    <button onclick="showSection('music')" class="active">音樂</button>
    <button onclick="showSection('art')">圖片</button>
  </nav>
</header>

<div class="container">

  <!-- 音樂 -->
  <section id="music" class="grid">
    <div class="card">
      <h3>AI音樂作品</h3>
      <p>我用AI生成的音樂</p>
      <audio controls>
        <source src="music/music1.mp3" type="audio/mpeg">
      </audio>
    </div>
  </section>

  <!-- 圖片 -->
  <section id="art" class="grid hidden">
    <div class="card">
      <img src="images/art1.png" onclick="openImage(this.src)">
      <h3>百年回眸</h3>
      <p>AI生成的古風意境作品</p>
    </div>
  </section>

</div>

<!-- 放大圖片視窗 -->
<div class="lightbox" id="lightbox" onclick="closeImage()">
  <img id="lightbox-img">
</div>

<script>
function showSection(section) {
  document.getElementById('music').classList.add('hidden');
  document.getElementById('art').classList.add('hidden');

  document.getElementById(section).classList.remove('hidden');

  document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
}

function openImage(src) {
  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightbox-img').src = src;
}

function closeImage() {
  document.getElementById('lightbox').style.display = 'none';
}
</script>

</body>
</html>
