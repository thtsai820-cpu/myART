<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI共創作品集</title>

<style>
body {
  margin:0;
  font-family:Arial, "Noto Sans TC", sans-serif;
  background:#0f172a;
  color:#e2e8f0;
}
header {
  text-align:center;
  padding:20px;
  background:#1e293b;
}

nav button {
  margin:5px;
  padding:8px 16px;
  border:none;
  border-radius:6px;
  background:#334155;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
nav button.active {
  background:#38bdf8;
  color:black;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* 🎧 音樂播放器 */
.music-player {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:20px;
}

.player {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.controls button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  cursor:pointer;
}

.playlist {
  background:#1e293b;
  border-radius:12px;
  max-height:500px;
  overflow-y:auto;
}

.track {
  padding:10px;
  border-bottom:1px solid #334155;
  cursor:pointer;
}

.track:hover { background:#334155; }
.active-track { background:#38bdf8; color:black; }

/* 🎨 畫廊 */
.gallery {
  column-count:3;
  column-gap:15px;
}
@media (max-width:900px){
  .gallery{column-count:2;}
  .music-player{grid-template-columns:1fr;}
}
@media (max-width:500px){
  .gallery{column-count:1;}
}

.item {
  break-inside:avoid;
  margin-bottom:15px;
  cursor:pointer;
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
}
.item img {
  width:100%;
  border-radius:10px 10px 0 0;
  display:block;
}
.item p {
  margin:0;
  padding:10px 12px 14px;
  line-height:1.5;
}

/* ✍️ 詩詞 */
.poetry-wrap {
  display:flex;
  flex-direction:column;
  gap:18px;
}

.poetry-intro {
  background:#1e293b;
  border-radius:12px;
  padding:16px 18px;
  line-height:1.8;
}

.poetry-intro details {
  background:#0f172a;
  border:1px solid #334155;
  border-radius:10px;
  padding:12px 14px;
}

.poetry-intro summary {
  cursor:pointer;
  font-weight:bold;
  color:#7dd3fc;
  margin-bottom:8px;
}

.glossary {
  white-space:pre-wrap;
  color:#cbd5e1;
  font-size:14px;
}

.poem-group {
  background:#1e293b;
  border-radius:14px;
  padding:18px;
}

.poem-date {
  margin:0 0 14px;
  color:#7dd3fc;
  font-size:20px;
  border-bottom:1px solid #334155;
  padding-bottom:10px;
}

.poem-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:14px;
}

.poem-card {
  background:#0f172a;
  border:1px solid #334155;
  border-radius:12px;
  padding:14px 16px;
  line-height:1.9;
  white-space:pre-wrap;
  color:#e2e8f0;
  min-height:120px;
}

.poem-note {
  color:#94a3b8;
  font-size:14px;
}

.loading-text,
.error-text {
  background:#1e293b;
  border-radius:12px;
  padding:18px;
}

.error-text { color:#fda4af; }

.hidden { display:none; }

/* 放大 */
.lightbox {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}
.lightbox img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<header>
  <h1>AI共創作品集</h1>
  <nav>
    <button onclick="showSection('music', this)" class="active">音樂</button>
    <button onclick="showSection('art', this)">圖象</button>
    <button onclick="showSection('calligraphy', this)">書法</button>
    <button onclick="showSection('poetry', this)">詩詞</button>
  </nav>
</header>

<div class="container">

  <!-- 🎧 音樂 -->
  <section id="music" class="music-player">
    <div class="player">
      <h2 id="title">選擇音樂</h2>
      <audio id="audio" controls></audio>

      <div class="controls">
        <button onclick="prev()">⏮</button>
        <button onclick="playPause()">▶ / ⏸</button>
        <button onclick="next()">⏭</button>
      </div>
    </div>

    <div class="playlist" id="playlist"></div>
  </section>

  <!-- 🖼️ 圖象 -->
  <section id="art" class="gallery hidden"></section>

  <!-- 🖌️ 書法 -->
  <section id="calligraphy" class="gallery hidden"></section>

  <!-- ✍️ 詩詞 -->
  <section id="poetry" class="poetry-wrap hidden">
    <div class="loading-text" id="poetry-loading">詩詞載入中...</div>
  </section>

</div>

<div class="lightbox" id="lightbox" onclick="closeImage()">
  <img id="lightbox-img" alt="放大圖片">
</div>

/* 🎧 播放器 */
let current = 0;
const audio = document.getElementById('audio');
const title = document.getElementById('title');
const playlist = document.getElementById('playlist');

function loadTrack(i){
  current = i;
  audio.src = tracks[i].file;
  title.innerText = tracks[i].title;
  highlight();
}

function playPause(){
  if(audio.paused) audio.play();
  else audio.pause();
}

function next(){
  current = (current + 1) % tracks.length;
  loadTrack(current);
  audio.play();
}

function prev(){
  current = (current - 1 + tracks.length) % tracks.length;
  loadTrack(current);
  audio.play();
}

audio.addEventListener('ended', next);

tracks.forEach((t, i) => {
  const div = document.createElement('div');
  div.className = 'track';
  div.innerText = t.title;
  div.onclick = () => {
    loadTrack(i);
    audio.play();
  };
  playlist.appendChild(div);
});

function highlight(){
  document.querySelectorAll('.track').forEach((el, i) => {
    el.classList.toggle('active-track', i === current);
  });
}

loadTrack(0);

/* 🖼️ 自動畫廊 */
function renderGallery(data, id){
  const container = document.getElementById(id);
  data.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <img 
        src="${item.file}" 
        alt="${item.title}" 
        loading="lazy" 
        decoding="async"
      >
      <p>${item.title}</p>
    `;
    div.onclick = () => openImage(item.file);
    container.appendChild(div);
  });
}

renderGallery(artworks, 'art');
renderGallery(calligraphy, 'calligraphy');

/* ✍️ 詩詞 */
async function loadPoetry(){
  const poetrySection = document.getElementById('poetry');
  const loading = document.getElementById('poetry-loading');

  try {
    const res = await fetch('poem.txt');
    if (!res.ok) throw new Error('無法讀取 poem.txt');
    const raw = await res.text();

    const parsed = parsePoetry(raw);
    renderPoetry(parsed, poetrySection);
  } catch (err) {
    loading.outerHTML = `<div class="error-text">詩詞載入失敗：${err.message}</div>`;
  }
}

function parsePoetry(text){
  const lines = text.replace(/\r/g, '').split('\n');
  const glossary = [];
  const groups = [];

  let currentGroup = null;
  let currentPoem = [];

  function isDateTitle(line){
    const s = line.trim();
    return /^～?\s*\d{4,6}[\/年]/.test(s);
  }

  function isSeparator(line){
    const s = line.trim();
    return /^(O|o|I|i|O音|in)$/.test(s);
  }

  function pushCurrentPoem(){
    if (!currentGroup) return;
    const poemText = currentPoem.join('\n').trim();
    if (poemText) currentGroup.poems.push(poemText);
    currentPoem = [];
  }

  for (let i = 0; i < lines.length; i++) {
    const rawLine = lines[i];
    const line = rawLine.trim();

    if (!line) {
      if (currentPoem.length) currentPoem.push('');
      continue;
    }

    if (!currentGroup && !isDateTitle(line)) {
      glossary.push(line);
      continue;
    }

    if (isDateTitle(line)) {
      pushCurrentPoem();
      if (currentGroup) groups.push(currentGroup);
      currentGroup = { title: line.replace(/^～\s*/, ''), poems: [] };
      continue;
    }

    if (isSeparator(line)) {
      pushCurrentPoem();
      continue;
    }

    if (currentGroup) {
      currentPoem.push(rawLine.trim());
    }
  }

  pushCurrentPoem();
  if (currentGroup) groups.push(currentGroup);

  return { glossary, groups };
}

function renderPoetry(data, container){
  container.innerHTML = '';

  if (data.glossary.length) {
    const intro = document.createElement('div');
    intro.className = 'poetry-intro';
    intro.innerHTML = `
      <details>
        <summary>詩詞中的字詞註解與語彙整理</summary>
        <div class="glossary">${escapeHtml(data.glossary.join('\n'))}</div>
      </details>
    `;
    container.appendChild(intro);
  }

  if (!data.groups.length) {
    const empty = document.createElement('div');
    empty.className = 'loading-text';
    empty.textContent = '目前尚無詩詞內容。';
    container.appendChild(empty);
    return;
  }

  data.groups.forEach(group => {
    const section = document.createElement('div');
    section.className = 'poem-group';

    const cards = group.poems.length
      ? group.poems.map(poem => `<article class="poem-card">${escapeHtml(poem)}</article>`).join('')
      : `<div class="poem-note">此日期下目前沒有可顯示的詩作內容。</div>`;

    section.innerHTML = `
      <h2 class="poem-date">${escapeHtml(group.title)}</h2>
      <div class="poem-grid">${cards}</div>
    `;

    container.appendChild(section);
  });
}

function escapeHtml(str){
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* UI */
function showSection(section, buttonEl){
  ['music', 'art', 'calligraphy', 'poetry'].forEach(id => {
    document.getElementById(id).classList.add('hidden');
  });
  document.getElementById(section).classList.remove('hidden');

  document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
  if (buttonEl) buttonEl.classList.add('active');
}

function openImage(src){
  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightbox-img').src = src;
}

function closeImage(){
  document.getElementById('lightbox').style.display = 'none';
}

loadPoetry();
</script>
